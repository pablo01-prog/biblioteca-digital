<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <title>Panel de Administración - Biblioteca Digital</title>
  </head>

  <body>
    <audio id="musica-fondo" loop>
      <source src="imagenes/musicword-library-312688.mp3" type="audio/mpeg" />
    </audio>

    <button
      id="control-audio"
      class="boton-flotante-audio"
      onclick="toggleAudio()"
    >
      <span id="icono-audio">▶</span>
    </button>

    <script>
      function toggleAudio() {
        const audio = document.getElementById("musica-fondo");
        const icono = document.getElementById("icono-audio");

        if (audio.paused) {
          audio.play();
          icono.innerText = "⏸"; // Cambia a pausa
        } else {
          audio.pause();
          icono.innerText = "▶"; // Cambia a play
        }
      }
    </script>
    <div class="contenedor-panel" data-page="admin">
      <aside class="barra-lateral">
        <nav style="height: 100%; display: flex; flex-direction: column">
          <ul class="lista-nav" style="flex-grow: 1">
            <li class="lista-nav__item">
              <button class="lista-nav__link activo" data-target="libros">
                📚 Gestionar Libros
              </button>
            </li>
            <li class="lista-nav__item">
              <button class="lista-nav__link" data-target="usuarios">
                👥 Gestionar Usuarios
              </button>
            </li>

            <li
              class="lista-nav__item"
              style="margin-top: auto; padding-bottom: 20px"
            >
              <button
                id="btn-logout"
                class="btn btn--outline"
                style="
                  width: 100%;
                  color: var(--color-borgona);
                  border-color: var(--color-borgona);
                "
              >
                🚪 Volver al Inicio
              </button>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="contenido-principal">

        <!-- ── Sección Libros ────────────────────────────── -->
        <section id="seccion-libros">
        <header class="header-admin">
          <h2>Panel de Control</h2>
          <button class="boton boton-principal" data-modal-open="nuevo-libro">
            + Nuevo Libro
          </button>
        </header>

        <section
          class="stats-grid"
          style="display: flex; gap: 20px; margin-bottom: 30px"
        >
          <div
            class="stat-card"
            style="
              background: white;
              padding: 20px;
              border-radius: 15px;
              flex: 1;
              text-align: center;
              border: 1px solid var(--color-borde);
            "
          >
            <h4>Total Libros</h4>
            <p
              id="stat-total"
              style="
                font-size: 2rem;
                font-weight: bold;
                color: var(--color-borgona);
              "
            >
              0
            </p>
          </div>
          <div
            class="stat-card"
            style="
              background: white;
              padding: 20px;
              border-radius: 15px;
              flex: 1;
              text-align: center;
              border: 1px solid var(--color-borde);
            "
          >
            <h4>Prestados</h4>
            <p
              id="stat-prestados"
              style="
                font-size: 2rem;
                font-weight: bold;
                color: var(--color-oliva);
              "
            >
              0
            </p>
          </div>
          <div
            class="stat-card"
            style="
              background: white;
              padding: 20px;
              border-radius: 15px;
              flex: 1;
              text-align: center;
              border: 1px solid var(--color-borde);
            "
          >
            <h4>Disponibles</h4>
            <p
              id="stat-disponibles"
              style="font-size: 2rem; font-weight: bold; color: #666;"
            >
              0
            </p>
          </div>
        </section>

        <div id="lista-admin-libros"></div>
        </section>

        <!-- ── Sección Usuarios (NUEVA) ──────────────────── -->
        <section id="seccion-usuarios" hidden>
          <header class="header-admin">
            <h2>Gestión de Usuarios</h2>
            <button class="boton boton-principal" data-modal-open="nuevo-usuario">
              + Nuevo Usuario
            </button>
          </header>
          <div id="lista-admin-usuarios"></div>
        </section>

      </main>
    </div>

    <div class="modal" data-modal="nuevo-libro" hidden>
      <div class="modal__content">
        <h3>Añadir Nuevo Libro</h3>
        <form class="form" data-admin-form="form">
          <label for="titulo">Título</label>
          <input type="text" name="titulo" id="titulo" required />

          <label for="autor">Autor</label>
          <input type="text" name="autor" id="autor" required />

          <label for="estado">Estado inicial</label>
          <select name="estado" id="estado">
            <option value="disponible" selected>Disponible</option>
            <option value="prestado">Prestado</option>
          </select>

          <label for="imagen-libro">Imagen de portada</label>
          <input
            type="file"
            name="imagen"
            id="imagen-libro"
            data-field="imagen"
            accept="image/*"
          />

          <div class="preview-imagen" data-preview="wrap" hidden>
            <p>Vista previa:</p>
            <img
              data-preview="img"
              style="max-width: 100px; border-radius: 10px"
            />
          </div>

          <!-- Campo de sinopsis manual -->
          <label for="sinopsis-manual">
            Sinopsis
            <span class="label-opcional">(opcional)</span>
          </label>
          <div class="sinopsis-wrap">
            <textarea
              id="sinopsis-manual"
              name="sinopsis"
              class="sinopsis-textarea"
              rows="5"
              maxlength="600"
              placeholder="Escribe aquí una breve descripción del libro, o pulsa el botón de abajo para obtenerla automáticamente..."
            ></textarea>
            <span class="sinopsis-contador"><span id="sinopsis-count">0</span>/600</span>
          </div>

          <!-- URL de portada: se rellena con Google Books o manualmente -->
          <label for="gb-imagen-url">URL de portada <span style="color:gray; font-size:0.8rem;">(opcional — se rellena automáticamente con Google Books)</span></label>
          <input type="url" id="gb-imagen-url" value="" placeholder="https://... o deja vacío" />

          <button type="button" id="btn-google-books" class="boton boton-contorno" style="width:100%; margin-bottom:10px;">
            🔍 Obtener portada y sinopsis de Google Books
          </button>

                    <div class="modal__actions">
            <button
              class="boton boton-contorno"
              type="button"
              data-modal-close="nuevo-libro"
            >
              Cancelar
            </button>
            <button class="boton boton-principal" type="submit">
              Guardar Libro
            </button>
          </div>
          <p
            data-admin-form="msg"
            style="text-align: center; margin-top: 10px"
          ></p>
        </form>
      </div>
    </div>

    <script src="js/admin.js" type="module"></script>

    <!-- ══ MODAL: Nuevo / Editar Usuario (NUEVO) ════════════ -->
    <div class="modal" data-modal="nuevo-usuario" hidden>
      <div class="modal__content">
        <h3 id="modal-usuario-titulo">Añadir Nuevo Usuario</h3>
        <form class="form" id="form-usuario">
          <input type="hidden" id="usuario-id" />

          <label for="usuario-email">Email</label>
          <input type="email" id="usuario-email" required />
          <small id="error-email" style="color: var(--color-borgona); display:block; margin-top:-14px; margin-bottom:10px;"></small>

          <label for="usuario-password">
            Contraseña
            <span id="pass-hint" style="font-size:0.8rem; color: var(--color-gris-claro);">(dejar vacío para no cambiarla)</span>
          </label>
          <input type="password" id="usuario-password" />
          <small id="error-password" style="color: var(--color-borgona); display:block; margin-top:-14px; margin-bottom:10px;"></small>

          <label for="usuario-rol">Rol</label>
          <select id="usuario-rol" style="padding: 10px 18px; border: 1px solid var(--color-borde); border-radius: 9999px; width: 100%; margin-bottom: 18px; background: white;">
            <option value="usuario">Usuario</option>
            <option value="admin">Admin</option>
          </select>

          <div class="modal__actions">
            <button class="boton boton-contorno" type="button" data-modal-close="nuevo-usuario">Cancelar</button>
            <button class="boton boton-principal" type="submit">Guardar</button>
          </div>
          <p id="msg-usuario" style="text-align: center; margin-top: 10px; min-height: 1.2em;"></p>
        </form>
      </div>
    </div>

    <script src="js/usuarios.js" type="module"></script>
  </body>
</html>
