<!DOCTYPE html>
<!-- index.html — Página principal del catálogo de libros (pública).
     El JavaScript app.js carga los libros, filtros y reseñas. -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
  <title>Inicio — Biblioteca Digital</title>
</head>

<body>
  <audio id="musica-fondo" loop>
    <source src="imagenes/musicword-library-312688.mp3" type="audio/mpeg" />
  </audio>
  <button id="control-audio" class="boton-flotante-audio" onclick="toggleAudio()">
    <span id="icono-audio">▶</span>
  </button>
  <script>
    function toggleAudio() {
      const audio = document.getElementById("musica-fondo");
      const icono = document.getElementById("icono-audio");
      if (audio.paused) { audio.play(); icono.innerText = "⏸"; }
      else { audio.pause(); icono.innerText = "▶"; }
    }
  </script>

  <header class="hero">
    <div class="hero-nav">
      <a id="btn-login" href="login.html" class="btn btn--outline btn-nav-hero">
        Iniciar Sesión
      </a>
      <a id="btn-acceso-personal" href="mis-libros.html" class="btn btn--outline btn-nav-hero" hidden>
        Mis Libros
      </a>
      <a id="btn-logout-index" href="api/logout.php" class="btn btn--outline btn-nav-hero" hidden>
        Cerrar Sesión
      </a>
    </div>

    <div class="contenedor-padded seccion-index">
      <h1 class="titulo-hero">Encuentra tu próximo libro</h1>
      <p class="hero-subtitulo">Busca por título, autor o género</p>

      <form data-search="form">
        <div class="filtros-wrap">
          <div class="filtro-grupo">
            <label for="filtro-titulo">Título</label>
            <input id="filtro-titulo" type="text" placeholder="Ej: El Hobbit" autocomplete="off" data-filter="titulo" />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-autor">Autor</label>
            <input id="filtro-autor" type="text" placeholder="Ej: Tolkien" autocomplete="off" data-filter="autor" />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-genero">Género</label>
            <select id="filtro-genero" data-filter="genero">
              <option value="">Todos los géneros</option>
            </select>
          </div>
          <button class="btn btn--primary btn-buscar-filtros" type="submit">🔍 Buscar</button>
        </div>
      </form>
    </div>
  </header>

  <main class="pagina">
    <hr class="separador-catalogo">

    <section class="contenedor-padded seccion-catalogo">
      <div class="fila-center">
        <h2 class="titulo-seccion">Catálogo General</h2>
      </div>

      <p id="banner-recomendaciones" hidden>
        ✨ Hola, <strong id="banner-nombre"></strong> — hemos ordenado el catálogo según tus preferencias
        (<span id="banner-prefs-texto"></span>).
        <a href="mis-libros.html" class="banner-prefs__link">Cambiarlas</a>
      </p>

      <div class="grid-destacados" data-grid="destacados"></div>
    </section>
  </main>

  <div id="modal-resenas" class="modal" hidden>
    <div class="modal__overlay"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h3 class="modal__title" id="modal-resenas-titulo"></h3>
        <button id="cerrar-modal-resenas" class="boton boton-contorno btn-cerrar-modal">✕ Cerrar</button>
      </div>
      <div id="modal-resenas-lista" class="modal-resenas-lista"></div>
    </div>
  </div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
