<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
  <title>Inicio — Biblioteca Digital</title>
  <style>
    .filtros-wrap {
      max-width: 860px;
      margin: 20px auto 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .filtro-grupo label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
    }
    .filtro-grupo input,
    .filtro-grupo select {
      width: 100%;
      padding: 11px 16px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 0.92rem;
      margin-bottom: 0;
      backdrop-filter: blur(8px);
    }
    .filtro-grupo input::placeholder { color: rgba(255,255,255,0.5); }
    .filtro-grupo select option { background: #1a1a1a; color: white; }
    @media (max-width: 680px) { .filtros-wrap { grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <audio id="musica-fondo" loop>
    <source src="imagenes/musicword-library-312688.mp3" type="audio/mpeg" />
  </audio>
  <button id="control-audio" class="boton-flotante-audio" onclick="toggleAudio()">
    <span id="icono-audio">▶</span>
  </button>
  <script>
    function toggleAudio() {
      const audio = document.getElementById("musica-fondo");
      const icono = document.getElementById("icono-audio");
      if (audio.paused) { audio.play(); icono.innerText = "⏸"; }
      else { audio.pause(); icono.innerText = "▶"; }
    }
  </script>

  <header class="hero">
    <!-- Botones de navegación -->
    <div style="position:absolute; top:20px; right:24px; z-index:100; display:flex; gap:10px; align-items:center;">
      <a id="btn-login" href="login.html" class="btn btn--outline-light"
         style="background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.4); color:white;">
        Iniciar Sesión
      </a>
      <a id="btn-acceso-personal" href="mis-libros.html" class="btn btn--outline-light"
         style="background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.4); color:white;" hidden>
        Mis Libros
      </a>
      <a id="btn-logout-index" href="api/logout.php" class="btn btn--outline-light"
         style="background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.4); color:white;" hidden>
        Cerrar Sesión
      </a>
    </div>

    <div class="contenedor-padded seccion-index">
      <h1 class="titulo-hero">Encuentra tu próximo libro</h1>
      <p style="color:rgba(255,255,255,0.7); margin-bottom:8px;">Busca por título, autor o género</p>

      <form data-search="form">
        <div class="filtros-wrap">
          <div class="filtro-grupo">
            <label for="filtro-titulo">Título</label>
            <input id="filtro-titulo" type="text" placeholder="Ej: El Hobbit" autocomplete="off" data-filter="titulo" />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-autor">Autor</label>
            <input id="filtro-autor" type="text" placeholder="Ej: Tolkien" autocomplete="off" data-filter="autor" />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-genero">Género</label>
            <select id="filtro-genero" data-filter="genero">
              <option value="">Todos los géneros</option>
            </select>
          </div>
          <button class="btn btn--primary" type="submit" style="height:44px; white-space:nowrap;">🔍 Buscar</button>
        </div>
      </form>
    </div>
  </header>

  <main class="pagina">
    <hr style="border:0; height:1px; background:#e5e0d8; margin:0 auto 48px; max-width:80%;">

    <section class="contenedor-padded" style="padding-top:0;">
      <div class="fila-center">
        <h2 class="titulo-seccion">Catálogo General</h2>
      </div>

      <!-- Banner de recomendaciones — se muestra si el usuario tiene preferencias -->
      <p id="banner-recomendaciones" hidden
         style="max-width:1200px; margin:0 auto 24px; padding:12px 20px;
                background:rgba(140,43,50,0.07); border:1px solid rgba(140,43,50,0.18);
                border-radius:14px; font-size:0.92rem; color:#1a1a1a;"></p>

      <div class="grid-destacados" data-grid="destacados"></div>
    </section>
  </main>

  <!-- ══ Modal de reseñas ══
       Se abre al pulsar "Ver reseñas" en cualquier tarjeta.
       Es visible para todos — no hace falta estar logueado. -->
  <div id="modal-resenas" class="modal" hidden>
    <div class="modal__overlay"></div>
    <div class="modal__content">

      <div class="modal__header">
        <h3 class="modal__title" id="modal-resenas-titulo"></h3>
        <button id="cerrar-modal-resenas" class="boton boton-contorno"
                style="padding:6px 16px; font-size:0.9rem;">✕ Cerrar</button>
      </div>

      <!-- Lista de reseñas — app.js la rellena dinámicamente -->
      <div id="modal-resenas-lista" style="max-height:60vh; overflow-y:auto;"></div>

    </div>
  </div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
