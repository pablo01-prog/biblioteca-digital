<!doctype html>
<!-- registro.html — Formulario de alta de usuario. El JavaScript auth/registro.js llama a api/registro.php -->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <title>Crear Cuenta</title>
  </head>

  <body>
    <audio id="musica-fondo" loop>
      <source src="imagenes/musicword-library-312688.mp3" type="audio/mpeg" />
    </audio>

    <button id="control-audio" class="boton-flotante-audio" onclick="toggleAudio()">
      <span id="icono-audio">▶</span>
    </button>

    <script>
      function toggleAudio() {
        const audio = document.getElementById("musica-fondo");
        const icono = document.getElementById("icono-audio");
        if (audio.paused) { audio.play(); icono.innerText = "⏸"; }
        else { audio.pause(); icono.innerText = "▶"; }
      }
    </script>

    <div class="contenedor-login" data-page="registro">
      <div class="lado-info">
        <div class="tarjeta-vidrio tarjeta-vidrio--login" data-auth="promo">
          <h1 class="fuente-serie">Biblioteca Digital</h1>
          <p class="texto-muted texto-muted--espaciado">
            Únete a nuestra comunidad lectora y accede a miles de libros.
          </p>
          <div class="stats-login" data-auth="stats">
            <div class="stat-item" data-stat="books">
              <strong>2.450</strong><br />
              <span>Libros</span>
            </div>
            <div class="stat-item" data-stat="authors">
              <strong>180</strong><br />
              <span>Autores</span>
            </div>
          </div>
        </div>
      </div>

      <div class="lado-formulario">
        <div class="contenedor-form">
          <h2 class="fuente-serie">Crear Cuenta</h2>
          <form class="form" id="form-registro">

            <label for="email">Correo</label>
            <input
              id="email"
              type="email"
              autocomplete="email"
              placeholder="tu@correo.com"
              required
            />
            <small id="error-email" class="mensajeUser campo-error"></small>

            <label for="password">Contraseña</label>
            <input
              id="password"
              type="password"
              autocomplete="new-password"
              placeholder="Mínimo 8 caracteres"
              required
            />
            <small id="error-password" class="mensajePswd campo-error"></small>

            <label for="password2">Repetir contraseña</label>
            <input
              id="password2"
              type="password"
              autocomplete="new-password"
              placeholder="Repite la contraseña"
              required
            />
            <small id="error-password2" class="campo-error"></small>

            <button class="boton boton-principal" type="submit">
              Registrarse
            </button>

            <p class="texto-registro">
              ¿Ya tienes cuenta?
              <a href="login.html" class="btn--ghost">Inicia sesión aquí</a>
            </p>

            <p class="form__mensaje auth-mensaje" role="status" aria-live="polite" id="mensaje-estado"></p>
          </form>
        </div>
      </div>
    </div>

    <script src="js/auth/registro.js" type="module"></script>
  </body>
</html>
