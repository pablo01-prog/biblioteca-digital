<!doctype html>
<!-- login.html — Formulario de inicio de sesión. El JavaScript auth/login.js valida y llama a api/login.php -->
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="global.css" />
    <title>Iniciar Sesión</title>
  </head>

  <body>
    <audio id="musica-fondo" loop>
      <source src="imagenes/musicword-library-312688.mp3" type="audio/mpeg" />
    </audio>

    <button id="control-audio" class="boton-flotante-audio" onclick="toggleAudio()">
      <span id="icono-audio">▶</span>
    </button>

    <script>
      function toggleAudio() {
        const audio = document.getElementById("musica-fondo");
        const icono = document.getElementById("icono-audio");
        if (audio.paused) { audio.play(); icono.innerText = "⏸"; }
        else { audio.pause(); icono.innerText = "▶"; }
      }
    </script>

    <div class="contenedor-login" data-page="login">
      <div class="lado-info">
        <div class="tarjeta-vidrio tarjeta-vidrio--login" data-auth="promo">
          <h1 class="fuente-serie">Biblioteca Digital</h1>
          <div class="stats-login" data-auth="stats">
            <div class="stat-item" data-stat="books">
              <strong>2.450</strong><br />
              <span>Libros</span>
            </div>
            <div class="stat-item" data-stat="authors">
              <strong>180</strong><br />
              <span>Autores</span>
            </div>
          </div>
        </div>
      </div>

      <div class="lado-formulario">
        <div class="contenedor-form">
          <h2 class="fuente-serie">Inicio de Sesion</h2>
          <form class="form" data-auth="form">
            <label for="email">Correo</label>
            <input
              id="email"
              type="email"
              autocomplete="email"
              required
              data-auth="email"
            />
            <small class="mensajeUser"></small>

            <label for="password">Contraseña</label>
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              required
              data-auth="password"
            />
            <small class="mensajePswd"></small>

            <button class="boton boton-principal" type="submit" data-auth="submit">
              Entrar
            </button>

            <p class="texto-registro">
              ¿No tienes cuenta?
              <a href="#" id="link-registro" class="btn--ghost">Regístrate aquí</a>
            </p>

            <p class="form__mensaje auth-mensaje" role="status" aria-live="polite" data-auth="message"></p>
          </form>
        </div>
      </div>
    </div>

    <!-- Script al final del body para que el DOM esté listo -->
    <script src="js/auth/login.js" type="module"></script>
  </body>
</html>
