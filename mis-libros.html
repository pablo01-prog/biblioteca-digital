<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="global.css">
  <title>Mi Biblioteca - Préstamos</title>
</head>
<body>

  <header class="hero-mini" style="padding: 20px; background: #800020; color: white;">
    <nav style="display: flex; justify-content: space-between; align-items: center;">

      <h1>Mis Lecturas</h1>

      <div style="display: flex; align-items: center; gap: 20px;">
        <!-- Lleva al catálogo general -->
        <a href="index.html" id="btn-inicio"
           style="color: white; text-decoration: none; font-weight: 500;">
          Inicio
        </a>

        <!-- Vuelve a mis-libros (acceso personal) -->
        <a href="mis-libros.html" id="btn-acceso-personal"
           style="color: white; text-decoration: none; font-weight: 500;">
          Acceso Personal
        </a>

        <!-- Cierra sesión en el servidor y redirige a login -->
        <button id="btn-logout" class="btn"
                style="background: white; color: #800020; font-weight: 600; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer;">
          Cerrar Sesión
        </button>
      </div>

    </nav>
  </header>

  <main class="contenedor-padded">

    <section>
      <h2 class="titulo-seccion">Mis Préstamos Actuales</h2>
      <div id="mis-prestamos" class="grid-destacados"></div>
    </section>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">

    <section>
      <h2 class="titulo-seccion">Libros Disponibles para coger</h2>
      <div id="catalogo-prestamos" class="grid-destacados"></div>
    </section>

  </main>

  <script src="js/prestamos.js" type="module"></script>
</body>
</html>
